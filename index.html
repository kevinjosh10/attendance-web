<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jerusalem Attendance System - CSE A</title>
    <!-- Link to the separated CSS file -->
    <link rel="stylesheet" href="src/styles/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="app-header">
            <h1>Jerusalem Attendance</h1>
            <div class="datetime">
                <div id="current-date">--</div>
                <div id="current-time">--:--</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="app-main">
            <!-- Student Details Form -->
            <div id="student-form" class="name-form">
                <div class="card">
                    <h2>👋 Welcome Student</h2>
                    <p style="color: var(--text-muted); margin-bottom: 24px;">Enter your details to continue</p>
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="student-name">Full Name</label>
                            <input type="text" id="student-name" placeholder="John Doe" maxlength="50">
                        </div>
                        
                        <div class="form-group">
                            <label for="department">Department</label>
                            <select id="department">
                                <option value="">Select Department</option>
                                <option value="CSE">Computer Science & Engineering</option>
                                <option value="ECE">Electronics & Communication</option>
                                <option value="EEE">Electrical & Electronics</option>
                                <option value="MECH">Mechanical Engineering</option>
                                <option value="CIVIL">Civil Engineering</option>
                                <option value="IT">Information Technology</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="year">Academic Year</label>
                        <select id="year">
                            <option value="">Select Year</option>
                            <option value="1">1st Year</option>
                            <option value="2">2nd Year</option>
                            <option value="3">3rd Year</option>
                            <option value="4">4th Year</option>
                        </select>
                    </div>
                    
                    <button id="continue-btn" class="primary-btn">Continue</button>
                </div>
            </div>

            <!-- Attendance Section -->
            <div id="attendance-section" style="display: none;">
                <div class="card">
                    <h2>Welcome back!</h2>
                    <div class="student-details" id="student-details-display"></div>
                </div>
                
                <div class="card attendance-card">
                    <div class="current-time" id="current-time-display">--:--</div>
                    <div id="location-info" class="location-info hidden">
                        📍 Location: <span id="location-display"></span>
                    </div>
                    <button id="mark-attendance-btn" class="primary-btn">
                        Mark Attendance
                    </button>
                    <div id="status-message" class="status-message"></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="app-footer">
            <div>Geolocation-based Attendance System</div>
            <div class="author-line">Built with AWS Lambda & API Gateway</div>
        </div>
    </div>

    <!-- Include ES Module Script -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
